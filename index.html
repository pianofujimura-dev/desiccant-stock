<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乾燥剤管理V5</title>
<style>
body{
  font-family:sans-serif;
  background:#eef3ff;
  margin:20px;
  line-height:1.6;
}
h1{
  font-size:30px;
}
.box{
  background:white;
  padding:18px;
  margin-bottom:18px;
  border-radius:12px;
  box-shadow:0 0 6px rgba(0,0,0,0.15);
}
button{
  font-size:20px;
  padding:12px 18px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
  cursor:pointer;
}
button:hover{
  background:#388e3c;
}
.warehouseBtn{
  background:#e53935;
}
.warehouseBtn:hover{
  background:#c62828;
}
input,select{
  font-size:18px;
  padding:10px;
  margin:5px;
  border:1px solid #bbb;
  border-radius:8px;
}
.stock{
  font-size:24px;
  color:green;
  font-weight:bold;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
  font-size:16px;
}
th{
  background:#dfe8ff;
}
.delete{
  background:red;
}
.delete:hover{
  background:#c40000;
}
hr{
  margin:16px 0;
}
.label{
  font-weight:bold;
}
.inlineRow{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
#tunerButtons{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
#warehouseBox{
  display:flex;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
}
.guideTitle{
  font-size:20px;
  font-weight:bold;
  padding:12px 14px;
  margin:10px 0 14px 0;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}
.guideTitle:hover{
  transform:translateY(-1px);
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
}
.guideTitle.inColor{
  background:#e3f2fd;
  border-left:6px solid #64b5f6;
}
.guideTitle.moveColor{
  background:#ffe0b2;
  border-left:6px solid #fb8c00;
}
.guideTitle.serviceColor{
  background:#fff3cd;
  border-left:6px solid #fff3cd;
  color:black;
}
.guideTitle.initialColor{
  background:#e8f5e9;
  border-left:6px solid #43a047;
}
.guideTitle.sellColor{
  background:#ffcdd2;
  border-left:6px solid #e53935;
}
.sectionBody{
  display:none;
  margin:0;
  padding:0;
  overflow:hidden;
}
#sellBox{
  display:none;
}
#sellBox input,
#sellBox button,
#sellBox .label{
  margin:0;
}
.modeBtn{
  background:#3f51b5;
}
.modeBtn:hover{
  background:#2f3f99;
}
.smallNote{
  font-size:14px;
  color:#555;
}
@media (max-width:600px){
  button{
    width:100%;
    font-size:22px;
  }
  input,select{
    width:100%;
  }
}
</style>
</head>
<body>

<h1>乾燥剤管理システム</h1>

<div id="home">
 <div class="box" id="warehouseBox">
  木津倉庫 残数
  <span class="stock" id="totalStock">0個</span>
  <span id="warehouseButton"></span>
  <button class="modeBtn" onclick="exportCSV()">CSV出力</button>
</div>

  <div class="box">
    <div id="tunerButtons"></div>
    <div class="box">
      <div id="tunerStockList"></div>
    </div>
  </div>
</div>

<div id="page" style="display:none;">
  <div class="box">
  <button onclick="goHome()">戻る</button>
  <h2 id="title"></h2>
  残数
  <span class="stock" id="stock"></span>
</div>

  <div class="box">

    <div id="normalIn" style="display:none;">
      <div class="guideTitle inColor" onclick="toggleSection('inSection')">
        倉庫に入庫したとき
      </div>

      <div id="inSection" class="sectionBody">
  <div class="inlineRow">
    <span class="label">入庫日:</span>
    <input type="date" id="stockInDate">

    <span class="label">箱:</span>
    <select id="boxCount">
      <option value="">--箱数--</option>
      <option value="1">1箱</option>
      <option value="2">2箱</option>
      <option value="3">3箱</option>
      <option value="4">4箱</option>
      <option value="5">5箱</option>
      <option value="6">6箱</option>
      <option value="7">7箱</option>
      <option value="8">8箱</option>
      <option value="9">9箱</option>
      <option value="10">10箱</option>
    </select>

    <span class="label">個数:</span>
    <input type="number" id="inQtyPage" min="1" style="width:90px;">

    <button onclick="stockInWarehouse()">入庫する</button>
  </div>
</div>
    </div>

    <div id="moveBox" style="display:none;">
      <hr>
      <div class="guideTitle moveColor" onclick="toggleSection('moveSection')">
        調律師に渡すとき
      </div>

      <div id="moveSection" class="sectionBody">
  <div class="inlineRow">
    <span class="label">調律師:</span>
    <select id="moveName"></select>

    <span class="label">箱数:</span>
    <select id="moveBoxCount">
      <option value="0">0箱</option>
      <option value="1">1箱</option>
      <option value="2">2箱</option>
      <option value="3">3箱</option>
      <option value="4">4箱</option>
      <option value="5">5箱</option>
      <option value="6">6箱</option>
      <option value="7">7箱</option>
      <option value="8">8箱</option>
      <option value="9">9箱</option>
      <option value="10">10箱</option>
    </select>

    <span class="label">個数:</span>
    <input type="number" id="movePieceQty" min="0" style="width:90px;">

    <button onclick="moveOne()">渡す</button>
  </div>
</div>
      </div>
    </div>

    <div id="serviceBox" style="display:none;">
      <hr>
      <div class="guideTitle serviceColor" onclick="toggleSection('serviceSection')">
        リメイクサービス時
      </div>

      <div id="serviceSection" class="sectionBody">
        <div class="inlineRow">
          <span class="label">日付:</span>
          <input type="date" id="serviceDate">

          <span class="label">住所:</span>
          <input id="serviceAddr">

          <span class="label">名前:</span>
          <input id="serviceName">

          <span class="label">個数:</span>
          <input type="number" id="serviceQty" value="2" min="1" style="width:90px;">

          <button onclick="addService()">リメイク</button>
        </div>
      </div>
    </div>

    <div id="initialStockBox" style="display:none;">
      <hr>
      <div class="guideTitle initialColor" onclick="toggleSection('initialStockSection')">
        今持っている乾燥剤を追加
      </div>

      <div id="initialStockSection" class="sectionBody">
        <div class="inlineRow">
          <span class="label">日付:</span>
          <input type="date" id="initialDate">

          <span class="label">個数:</span>
          <input type="number" id="initialQty" min="1" style="width:100px;">

          <button onclick="addInitialStock()">追加する</button>
        </div>
      </div>
    </div>

    <div id="sellBox" style="display:none;">
      <hr>
      <div class="guideTitle sellColor" onclick="toggleSection('sellSection')">
        販売したとき
      </div>

      <div id="sellSection" class="sectionBody">
        <div class="inlineRow">
          <span class="label">日付:</span>
          <input type="date" id="date">

          <span class="label">住所:</span>
          <input id="addr">

          <span class="label">名前:</span>
          <input id="name">

          <span class="label">個数:</span>
          <input type="number" id="qty" min="1" style="width:100px;">

          <button onclick="add()">販売</button>
        </div>
      </div>
    </div>

  </div>

  <div class="box">
    <span class="label">検索:</span>
    <input id="search" onkeyup="search()" placeholder="日付・住所・名前で検索">
  </div>

  <div class="box">
    <table id="table">
      <thead>
        <tr>
          <th>日付</th>
          <th>住所</th>
          <th>名前</th>
          <th>個数</th>
          <th>削除</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const tuners = ["木津倉庫", "青山", "辻本", "中村", "丸山", "土屋", "坂本", "多田", "巽"];
const API_URL = "https://script.google.com/macros/s/AKfycbzFGVJhVdH3EW1XI9I1nCgm4JPn0hjjjHayp-KO3PZGS4yGUNuMiwJeKNwjINGx8J7W/exec";

let records = [];
let current = "";
let displayMode = "both";

async function loadRecords(){
  try{
    const res = await fetch(API_URL + "?t=" + Date.now());

    if(!res.ok){
      throw new Error("読込失敗: " + res.status);
    }

    const data = await res.json();
    console.log("load data:", data);

    if(!Array.isArray(data)){
      throw new Error("APIが配列を返していません: " + JSON.stringify(data));
    }

    records = data.map(r => ({
      tuner: r.tuner || "",
      date: r.date || "",
      addr: r.addr || "",
      name: r.name || "",
      qty: Number(r.qty || 0),
      pairId: r.pairId || ""
    }));

    updateTotal();

    if(current){
      update();
    }
  }catch(error){
    console.error("load error:", error);
    alert("データの読み込みに失敗しました\n" + error.message);
    records = [];
    updateTotal();
    if(current){
      update();
    }
  }
}

buildTunerButtons();
buildMoveOptions();
loadRecords();

function buildTunerButtons(){
  let html = "";
  let warehouseBtn = "";

  tuners.forEach(name => {
    if(name === "木津倉庫"){
      warehouseBtn = `
        <button class="warehouseBtn" onclick="openPage('${name}')">
          ${name}
        </button>
      `;
    }else{
      html += `
        <button onclick="openPage('${name}')">
          ${name}
        </button>
      `;
    }
  });

  id("tunerButtons").innerHTML = html;
  id("warehouseButton").innerHTML = warehouseBtn;
}

function buildMoveOptions(){
  let options = `<option value="">--選択--</option>`;

  tuners
    .filter(name => name !== "木津倉庫")
    .forEach(name => {
      options += `<option value="${name}">${name}</option>`;
    });

  id("moveName").innerHTML = options;
}

function toggleSection(sectionId){
  const target = document.getElementById(sectionId);
  if(!target) return;

  const sections = document.querySelectorAll("#page .sectionBody");
  const isOpen = window.getComputedStyle(target).display !== "none";

  sections.forEach(section => {
    section.style.display = "none";
  });

  if(!isOpen){
    target.style.display = "block";
  }
}

function openPage(name){
  current = name;

  id("home").style.display = "none";
  id("page").style.display = "block";
  id("title").innerText = name;

  clearInputs();

  if(name === "木津倉庫"){
    id("moveBox").style.display = "block";
    id("normalIn").style.display = "block";
    id("serviceBox").style.display = "block";
    id("initialStockBox").style.display = "none";
    id("sellBox").style.display = "none";
  }else{
    id("moveBox").style.display = "none";
    id("normalIn").style.display = "none";
    id("serviceBox").style.display = "none";
    id("initialStockBox").style.display = "block";
    id("sellBox").style.display = "block";
  }

  update();
}

function clearInputs(){
  id("date").value = "";
  id("addr").value = "";
  id("name").value = "";
  id("qty").value = "";
  id("inQtyPage").value = "";
  id("search").value = "";
  id("stockInDate").value = "";
  id("boxCount").value = "";
  id("moveBoxCount").value = "1";
  id("movePieceQty").value = "";

  id("serviceDate").value = "";
  id("serviceAddr").value = "";
  id("serviceName").value = "";
  id("serviceQty").value = "2";

  id("initialDate").value = "";
  id("initialQty").value = "";

  if(id("moveName").options.length > 0){
    id("moveName").value = "";
  }

  id("inSection").style.display = "none";
  id("moveSection").style.display = "none";
  id("serviceSection").style.display = "none";
  id("initialStockSection").style.display = "none";
  id("sellSection").style.display = "none";
}

function goHome(){
  id("home").style.display = "block";
  id("page").style.display = "none";
  current = "";
  updateTotal();
  updateDisplayModeLabel();
}


function formatQty(q){
  q = Number(q || 0);

  const abs = Math.abs(q);
  const box = Math.floor(abs / 30);
  const piece = abs % 30;

  if(abs === 0){
    return "0個";
  }

  if(box === 0){
    return (q < 0 ? "-" : "") + piece + "個";
  }

  if(piece === 0){
    return (q < 0 ? "-" : "") + box + "箱";
  }

  return (q < 0 ? "-" : "") + box + "箱" + piece + "個";
}
async function stockInWarehouse(){
  let stockDate = id("stockInDate").value;
  let pieceQty = Number(id("inQtyPage").value || 0);
  let box = Number(id("boxCount").value || 0);

  if(!stockDate){
    alert("入庫日を入力してください");
    return;
  }

  if(pieceQty <= 0 && box <= 0){
    alert("個数または箱数を入力してください");
    return;
  }

  let totalQty = 0;
  let label = [];

  if(box > 0){
    totalQty += box * 30;
    label.push(box + "箱");
  }

  if(pieceQty > 0){
    totalQty += pieceQty;
    label.push(pieceQty + "個");
  }

  records.push({
    tuner: current,
    date: stockDate + " 入庫(" + label.join("+") + ")",
    addr: "",
    name: "",
    qty: -totalQty
  });

  await save();
  clearInputs();
  update();
}

async function moveOne(){
  let to = id("moveName").value;

  if(!to){
    alert("渡す相手を選んでください");
    return;
  }

  let box = Number(id("moveBoxCount").value || 0);
  let piece = Number(id("movePieceQty").value || 0);

  if(box <= 0 && piece <= 0){
    alert("箱数または個数を入力してください");
    return;
  }

  let qty = box * 30 + piece;

  let warehouseStock = 0;
  records.forEach(r => {
    if(r.tuner === "木津倉庫"){
      warehouseStock -= Number(r.qty || 0);
    }
  });

  if(warehouseStock < qty){
    alert("木津倉庫の在庫が足りません");
    return;
  }

  let label = [];
  if(box > 0) label.push(box + "箱");
  if(piece > 0) label.push(piece + "個");

  let pairId = "move_" + Date.now();

  records.push({
    tuner: "木津倉庫",
    date: "持出(" + label.join("+") + ")",
    addr: "",
    name: to,
    qty: qty,
    pairId: pairId
  });

  records.push({
    tuner: to,
    date: "倉庫(" + label.join("+") + ")",
    addr: "",
    name: "",
    qty: -qty,
    pairId: pairId
  });

  await save();
  clearInputs();
  update();
}
async function addService(){
  let date = id("serviceDate").value;
  let addr = id("serviceAddr").value;
  let name = id("serviceName").value;
  let qty = Number(id("serviceQty").value);

  if(!date || !addr || !name || !qty){
    alert("日付・住所・名前・個数を入力してください");
    return;
  }

  records.push({
    tuner: "木津倉庫",
    date: date,
    addr: addr,
    name: "リメイク：" + name,
    qty: qty
  });

  await save();
  clearInputs();
  update();
}

async function addInitialStock(){
  let date = id("initialDate").value;
  let qty = Number(id("initialQty").value);

  if(!date || !qty || qty <= 0){
    alert("日付と個数を入力してください");
    return;
  }

  records.push({
    tuner: current,
    date: date + " 初期在庫",
    addr: "",
    name: "",
    qty: -qty
  });

  await save();
  clearInputs();
  update();
}

async function add(){
  let date = id("date").value;
  let addr = id("addr").value;
  let name = id("name").value;
  let qty = Number(id("qty").value);

  if(!date || !addr || !name || !qty){
    alert("日付・住所・名前・個数を入力してください");
    return;
  }

  records.push({
    tuner: current,
    date: date,
    addr: addr,
    name: name,
    qty: qty
  });

  await save();
  clearInputs();
  update();
}

function update(){
  let tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  let stock = 0;

  if(!Array.isArray(records)){
    id("stock").innerText = formatQty(0);
    return;
  }

  const currentRecords = records
    .map((r, i) => ({ ...r, originalIndex: i }))
    .filter(r => r.tuner === current);

  currentRecords.forEach(r => {
    stock -= Number(r.qty || 0);
  });

  const displayRecords = [...currentRecords].sort((a, b) => {
    return (b.date || "").localeCompare(a.date || "");
  });

  displayRecords.forEach(r => {
    let color = "";

    if((r.date || "").includes("入庫")) color = "#e3f2fd";
    else if((r.date || "").includes("持出")) color = "#ffe0b2";
    else if((r.name || "").includes("リメイク")) color = "#fff3cd";
    else if((r.date || "").includes("初期在庫")) color = "#e8f5e9";
    else if(Number(r.qty || 0) > 0) color = "#ffcdd2";
    else color = "#e8f5e9";

    let tr = document.createElement("tr");
    tr.style.background = color;

    tr.innerHTML = `
      <td>${r.date || ""}</td>
      <td>${r.addr || ""}</td>
      <td>${r.name || ""}</td>
      <td>${formatQty(Number(r.qty || 0))}</td>
      <td><button class="delete" onclick="del(${r.originalIndex})">削除</button></td>
    `;

    tbody.appendChild(tr);
  });

  id("stock").innerText = formatQty(stock);
}

function updateTunerStock(){
  let html = "";

  tuners.forEach(name => {
    let total = 0;

    records.forEach(r => {
      if(r.tuner === name){
        total -= Number(r.qty || 0);
      }
    });

    html += `
      <div style="
        display:inline-block;
        margin:5px;
        padding:8px 12px;
        border-radius:8px;
        background:#dfe8ff;
        font-weight:bold;
      ">
        ${name} : ${formatQty(total)}
      </div>
    `;
  });

  id("tunerStockList").innerHTML = html;
}

function updateTotal(){
  let total = 0;

  if(!Array.isArray(records)){
    id("totalStock").innerText = formatQty(0);
    return;
  }

  records.forEach(r => {
    if(r.tuner === "木津倉庫"){
      total -= Number(r.qty || 0);
    }
  });

  id("totalStock").innerText = formatQty(total);
  updateTunerStock();
}

function search(){
  let s = id("search").value.toLowerCase();

  document.querySelectorAll("#table tbody tr").forEach(tr => {
    tr.style.display = tr.innerText.toLowerCase().includes(s) ? "" : "none";
  });
}

async function del(i){
  if(!confirm("削除しますか？")){
    return;
  }

  let target = records[i];

  if(target.pairId){
    records = records.filter(r => r.pairId !== target.pairId);
  }else{
    records.splice(i, 1);
  }

  await save();
  update();
  updateTotal();
}

async function save(){
  try{
    console.log("送信前 records:", records);

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(records)
    });

    const text = await res.text();
    console.log("POST response status:", res.status);
    console.log("POST response text:", text);

    if(!res.ok){
      throw new Error("保存失敗: " + res.status + " / " + text);
    }

    localStorage.setItem("records", JSON.stringify(records));
    updateTotal();
    alert("保存しました");
  }catch(error){
    console.error("save error:", error);
    alert("データの保存に失敗しました\n" + error);
  }
}

function exportCSV(){
  if(!Array.isArray(records) || records.length === 0){
    alert("出力するデータがありません");
    return;
  }

  const headers = ["担当", "日付", "住所", "名前", "個数", "箱換算", "pairId"];
  const rows = [headers];

  records.forEach(r => {
    const qty = Number(r.qty || 0);
    const boxText = convertQtyToBoxText(qty);

    rows.push([
      escapeCSV(r.tuner || ""),
      escapeCSV(r.date || ""),
      escapeCSV(r.addr || ""),
      escapeCSV(r.name || ""),
      qty,
      escapeCSV(boxText),
      escapeCSV(r.pairId || "")
    ]);
  });

  const csvContent = "\uFEFF" + rows.map(row => row.join(",")).join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const now = new Date();
  const fileName =
    "乾燥剤管理_" +
    now.getFullYear() +
    String(now.getMonth() + 1).padStart(2, "0") +
    String(now.getDate()).padStart(2, "0") +
    "_" +
    String(now.getHours()).padStart(2, "0") +
    String(now.getMinutes()).padStart(2, "0") +
    String(now.getSeconds()).padStart(2, "0") +
    ".csv";

  const link = document.createElement("a");
  link.href = url;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  URL.revokeObjectURL(url);
}

function escapeCSV(value){
  const str = String(value ?? "");
  return `"${str.replace(/"/g, '""')}"`;
}

function convertQtyToBoxText(qty){
  qty = Number(qty || 0);

  const absQty = Math.abs(qty);
  const box = Math.floor(absQty / 30);
  const piece = absQty % 30;

  let text = "";

  if(box > 0 && piece > 0){
    text = box + "箱" + piece + "個";
  }else if(box > 0){
    text = box + "箱";
  }else{
    text = piece + "個";
  }

  return qty < 0 ? "-" + text : text;
}

function id(x){
  return document.getElementById(x);
}
</script>
